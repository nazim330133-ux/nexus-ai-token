<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060a"/>
      <stop offset="100%" stop-color="#0c0c1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#298dff"/>
      <stop offset="50%" stop-color="#4f7cff"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#298dff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" rx="56" fill="url(#bgGrad)" stroke="rgba(41,141,255,0.12)" stroke-width="1.5"/>
  <circle cx="200" cy="170" r="100" fill="url(#glowGrad)"/>
  <circle cx="200" cy="170" r="100" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.15"/>
  <circle cx="200" cy="170" r="70" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.3"/>
  <g filter="url(#glow)">
    <circle cx="200" cy="170" r="48" fill="none" stroke="url(#accentGrad)" stroke-width="3"/>
    <circle cx="200" cy="170" r="48" fill="url(#accentGrad)" opacity="0.08"/>
  </g>
  <g stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
    <line x1="200" y1="122" x2="200" y2="140"/>
    <line x1="200" y1="200" x2="200" y2="218"/>
    <line x1="152" y1="170" x2="170" y2="170"/>
    <line x1="230" y1="170" x2="248" y2="170"/>
    <line x1="188" y1="158" x2="200" y2="170"/>
    <line x1="212" y1="182" x2="224" y2="194"/>
    <line x1="188" y1="182" x2="176" y2="194"/>
    <line x1="212" y1="158" x2="200" y2="170"/>
  </g>
  <g opacity="0.4">
    <circle cx="200" cy="122" r="3.5" fill="#298dff"/>
    <circle cx="200" cy="218" r="3.5" fill="#298dff"/>
    <circle cx="152" cy="170" r="3.5" fill="#4f7cff"/>
    <circle cx="248" cy="170" r="3.5" fill="#4f7cff"/>
  </g>
  <text x="200" y="176" text-anchor="middle" fill="white" font-size="36" font-weight="700" font-family="system-ui, -apple-system, sans-serif" letter-spacing="-0.5">N</text>
  <text x="200" y="300" text-anchor="middle" fill="white" font-size="22" font-weight="700" font-family="system-ui, -apple-system, sans-serif" letter-spacing="3">NEXUS</text>
  <text x="200" y="325" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="12" font-family="'SF Mono', 'JetBrains Mono', monospace" letter-spacing="4">AI</text>
</svg>
